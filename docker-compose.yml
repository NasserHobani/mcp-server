# CS AI Bridge MCP project.
#
# Host URL: http://localhost:8071
# Start this project when the AI API needs MCP tools.

name: cs-ai-bridge-mcp

services:
  cs-ai-bridge-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: cs-ai-bridge-mcp:latest
    container_name: cs-ai-bridge-mcp
    restart: unless-stopped
    ports:
      - "8071:8000"
    env_file:
      - .env.example
      - path: .env
        required: false
    networks:
      - cs-ai-bridge-mcp

networks:
  cs-ai-bridge-mcp:
    name: cs-ai-bridge-mcp
