# CS AI Bridge MCP project.
#
# Host URL: http://localhost:8071
# Start ../api first when MCP needs to call the AI API.

name: cs-ai-bridge-mcp

services:
  cs-ai-bridge-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: cs-ai-bridge-mcp:latest
    container_name: cs-ai-bridge-mcp
    restart: unless-stopped
    ports:
      - "8071:8000"
    env_file:
      - .env.example
      - path: .env
        required: false
    environment:
      CS_AI_BRIDGE_LLM_API_BASE_URL: "${CS_AI_BRIDGE_LLM_API_BASE_URL:-http://host.docker.internal:8072}"
    networks:
      - cs-ai-bridge-mcp

networks:
  cs-ai-bridge-mcp:
    name: cs-ai-bridge-mcp
